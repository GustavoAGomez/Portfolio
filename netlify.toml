[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# SPA fallback: el routing es client-side (react-router), asi que cualquier
# deep link (/work/tagorodive) tiene que servir index.html con 200, no un 404.
# Va al final del archivo por orden de precedencia (Netlify aplica la primera
# regla que casa), pero como es la unica no hay conflicto.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Los assets de Vite llevan hash en el nombre -> cache inmutable.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Media pesada (18MB entre videos/imagenes/fonts/hdr): cache larga pero
# revalidable, porque estos nombres NO llevan hash.
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/env/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"
